<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生徒の作品リンク集(清和学園高校 情報Ⅰ）</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 1.8rem;
            color: #2c3e50;
            margin-bottom: 30px;
            text-align: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: block;
            background-color: #ffffff;
            color: #34495e;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            border: 1px solid #e2e8f0;
        }
        .btn:hover {
            background-color: #3498db;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(52, 152, 219, 0.2);
            border-color: #3498db;
        }
    </style>
</head>
<body>

    <h1>生徒の作品ページ</h1>
	<h2>清和学園高校 情報Ⅰ</h2>

    <div class="container">
        <!-- フォルダへの相対リンク -->
        <a href="A1/" class="btn">普通科アドバンス１年の作品</a>
        <a href="A3/" class="btn">普通科アドバンス３年の作品</a>
    </div>

</body>
</html>
